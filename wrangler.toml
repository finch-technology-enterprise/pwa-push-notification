name = "pwa-push-notification"
main = "worker/src/index.ts"
compatibility_date = "2026-07-16"
compatibility_flags = ["nodejs_compat"]

account_id = "28970b96b4880e4f41cc0487104898a0"

send_email = [
  { name = "EMAIL" }
]

# Serve the frontend build as static assets alongside the Worker API
[assets]
directory = "web/build"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "pwa-push-notification-db"
database_id = "4ced72f5-17bd-48c5-adff-d355ce1355f9"

[[durable_objects.bindings]]
name = "TOPIC_DO"
class_name = "TopicDO"

[[migrations]]
tag = "v1"
new_classes = ["TopicDO"]

[[migrations]]
tag = "v2"
deleted_classes = ["AuthDO"]

[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "pwa-push-attachments"

[vars]
BASE_URL = "https://pwa-push-notification.finchtech-my.workers.dev"
ENABLE_SIGNUP = "true"
ENABLE_LOGIN = "true"
ENABLE_RESET_PASSWORD = "true"
DISALLOWED_TOPICS = "docs,static,file,app,metrics,account,settings,signup,login,v1"
ACCESS_CONTROL_ALLOW_ORIGIN = "*"
VISITOR_SUBSCRIPTION_LIMIT = "30"
VISITOR_MESSAGE_DAILY_LIMIT = "0"
MESSAGE_SIZE_LIMIT = "4096"
KEEPALIVE_INTERVAL = "45"
ATTACHMENT_FILE_SIZE_LIMIT = "10485760"
ATTACHMENT_TOTAL_SIZE_LIMIT = "52428800"
SEND_EMAIL_FROM = "notify@finchtech.my"
SEND_EMAIL_FROM_NAME = "PWA Push Notification"
FCM_SERVER_KEY = ""
TWILIO_ACCOUNT_SID = ""
TWILIO_AUTH_TOKEN = ""
TWILIO_FROM_NUMBER = ""

[triggers]
crons = ["0 * * * *"]
